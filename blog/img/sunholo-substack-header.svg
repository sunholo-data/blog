<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 240" width="1456" height="240">
  <!-- Background -->
  <rect width="1456" height="240" fill="#f9f9f9"/>

  <!-- Three-circle motif, echoing the Sunholo logo, left-anchored -->
  <g transform="translate(140, 120)">
    <circle cx="-25" cy="0" r="62" fill="#f9a697" opacity="0.35"/>
    <circle cx="0" cy="0" r="62" fill="#e73c17" opacity="0.35"/>
    <circle cx="25" cy="0" r="62" fill="#e73c17"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="130"
        font-family="Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68"
        font-weight="700"
        fill="#2c3e50"
        letter-spacing="-1">sunholo</text>

  <!-- Tagline -->
  <text x="262" y="175"
        font-family="Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#2a9d8f"
        letter-spacing="1">AI Systems Designed to Last</text>

  <!-- Right-side accent: subtle concentric ring echo (decorative) -->
  <g transform="translate(1310, 120)" opacity="0.18">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#2a9d8f" stroke-width="2"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="#2a9d8f" stroke-width="2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  </g>
</svg>
