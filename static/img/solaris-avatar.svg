<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="60%" stop-color="#c94435"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c94435" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c94435" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="100" fill="#1a1a2e"/>
  <!-- Outer glow -->
  <circle cx="100" cy="100" r="85" fill="url(#glow)"/>
  <!-- Corona rays -->
  <g opacity="0.6" filter="url(#blur)">
    <line x1="100" y1="15" x2="100" y2="35" stroke="#d47758" stroke-width="2"/>
    <line x1="100" y1="165" x2="100" y2="185" stroke="#d47758" stroke-width="2"/>
    <line x1="15" y1="100" x2="35" y2="100" stroke="#d47758" stroke-width="2"/>
    <line x1="165" y1="100" x2="185" y2="100" stroke="#d47758" stroke-width="2"/>
    <line x1="40" y1="40" x2="55" y2="55" stroke="#d47758" stroke-width="2"/>
    <line x1="145" y1="145" x2="160" y2="160" stroke="#d47758" stroke-width="2"/>
    <line x1="40" y1="160" x2="55" y2="145" stroke="#d47758" stroke-width="2"/>
    <line x1="145" y1="55" x2="160" y2="40" stroke="#d47758" stroke-width="2"/>
  </g>
  <!-- Main solar disc -->
  <circle cx="100" cy="100" r="50" fill="url(#core)"/>
  <!-- Eclipse crescent (dark overlay) -->
  <circle cx="115" cy="90" r="45" fill="#1a1a2e" opacity="0.7"/>
  <!-- AI circuit dots -->
  <circle cx="80" cy="95" r="3" fill="#f5a623" opacity="0.9"/>
  <circle cx="75" cy="110" r="2" fill="#f5a623" opacity="0.7"/>
  <circle cx="90" cy="115" r="2.5" fill="#f5a623" opacity="0.8"/>
  <line x1="80" y1="95" x2="75" y2="110" stroke="#f5a623" stroke-width="1" opacity="0.5"/>
  <line x1="75" y1="110" x2="90" y2="115" stroke="#f5a623" stroke-width="1" opacity="0.5"/>
</svg>
